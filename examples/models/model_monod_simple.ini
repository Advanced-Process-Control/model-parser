; =======================================
; Model Definition File for MPC
; Model: Simple Monod Bioreactor (CSTR)
; Format: INI-style (ExprTk expressions)
; =======================================

[ModelInfo]
Name = monod_simple
Description = Simple continuous stirred-tank reactor with Monod kinetics (2 states, 0 inputs)
Version = 1.0

[Dimensions]
num_states  = 2
num_inputs  = 0
num_inputMV = 0
num_outputs = 2

[Parameters]
mu_max = 0.4     ; Maximum specific growth rate [1/h]
K_S    = 0.01    ; Half-saturation constant [g/L]
Y_XS   = 0.5     ; Yield coefficient biomass/substrate [-]

[StateEquationLocals]
var X   := max(x0, 0);  ; Biomass concentration [g/L]
var S   := max(x1, 0);  ; Substrate concentration [g/L]
var mu  := mu_max * S / (K_S + S);

[StateEquations]
dx0 = mu * X
dx1 = - mu * X / Y_XS

[OutputEquations]
y0 = X
y1 = mu

[x0]
0.05
15.0
