; =======================================
; Model Definition File for MPC
; Model: Heated Mixing Tank
; Format: INI-style (ExprTk expressions)
; =======================================

[ModelInfo]
Name = thermal_tank
Description = Heated mixing tank with inlet/outlet flow and electric heater (2 states, 3 inputs)
Version = 1.0

[Dimensions]
num_states  = 2
num_inputs  = 3
num_inputMV = 2
num_outputs = 2

[Parameters]
rho    = 1000.0   ; Fluid density [kg/m^3]
cp     = 4186.0   ; Specific heat capacity [J/(kg*K)]
UA     = 500.0    ; Heat loss coefficient [W/K]
T_amb  = 20.0     ; Ambient temperature [degC]
A_tank = 0.5      ; Tank cross-section area [m^2]
T_in   = 15.0     ; Inlet temperature [degC]

[StateEquationLocals]
var V     := max(x0, 0.001);  ; Tank volume [m^3], clamped > 0
var T     := x1;              ; Tank temperature [degC]
var F_in  := max(u0, 0);      ; Inlet flow [m^3/h]
var F_out := max(u1, 0);      ; Outlet flow [m^3/h]
var Q_el  := u2;              ; Electric heater power [W]
var Q_flow := rho * cp * F_in * (T_in - T) / 3600;   ; Convective heat [W]
var Q_loss := UA * (T - T_amb);                       ; Heat loss to ambient [W]
var V_cp   := rho * cp * V;                           ; Thermal capacity [J/K]

[StateEquations]
dx0 = F_in - F_out
dx1 = (Q_flow - Q_loss + Q_el) * 3600 / V_cp

[OutputEquations]
h := V / A_tank
y0 = h
y1 = T

[x0]
0.3
25.0

[u0]
0.1
0.1
1000.0
